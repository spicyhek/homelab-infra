apiVersion: apps/v1
kind: Deployment
metadata:
  name: nids
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nids
  template:
    metadata:
      labels:
        app: nids
    spec:
      containers:
        - name: web
          image: personal-site:1.0 #change when the app is made
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nids
  namespace: default
spec:
  selector:
    app: nids
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP

