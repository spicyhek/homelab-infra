apiVersion: v1
kind: ServiceAccount
metadata:
  name: status-api
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: status-api
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: status-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: status-api
subjects:
  - kind: ServiceAccount
    name: status-api
    namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-api
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: status-api
  template:
    metadata:
      labels:
        app: status-api
    spec:
      serviceAccountName: status-api
      containers:
        - name: status-api
          image: ghcr.io/spicyhek/status-api:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: CACHE_TTL_MS
              value: "30000"
            - name: REQUEST_TIMEOUT_MS
              value: "5000"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: STATUS_TARGETS_JSON
              value: >-
                [{"name":"nids.brendanmanley.com","host":"nids.brendanmanley.com"},{"name":"brendanmanley.com","host":"brendanmanley.com"},{"name":"grafana.brendanmanley.com","host":"grafana.brendanmanley.com"},{"name":"status.brendanmanley.com","host":"status.brendanmanley.com"}]
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: status-api
  namespace: default
spec:
  selector:
    app: status-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
  type: ClusterIP
