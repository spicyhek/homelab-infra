deploymentMode: SingleBinary

loki:
  auth_enabled: false
  storage:
    type: filesystem
  commonConfig:
    replication_factor: 1


  schemaConfig:
    configs:
      - from: "2026-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
  nodeSelector:
    observability: "heavy"

simpleScalable:
  replicas: 0

write:
  replicas: 0
read:
  replicas: 0
backend:
  replicas: 0
