grafana:
  startupProbe:
    httpGet:
      path: /api/health
      port: 3000
    failureThreshold: 60
    periodSeconds: 5

  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  service:
    type: ClusterIP
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password   
  resources:
    requests:
      cpu: 25m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

prometheus:
  prometheusSpec:
    retention: 3d
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    nodeSelector:
      observability: "heavy"

alertmanager:
  alertmanagerSpec:
    nodeSelector:
      observability: "heavy"
