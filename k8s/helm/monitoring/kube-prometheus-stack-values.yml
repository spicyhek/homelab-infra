defaultRules:
  create: true
  rules:
    kubeApiserverAvailability: false
    kubeApiserverBurnrate: false
    kubeApiserverHistogram: false
    kubeApiserverSlos: false

grafana:
  startupProbe:
    httpGet:
      path: /api/health
      port: 3000
    failureThreshold: 60
    periodSeconds: 5

  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  service:
    type: ClusterIP
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password   
  resources:
    requests:
      cpu: 25m
      memory: 256Mi
    limits:
      cpu: 450m
      memory: 512Mi

prometheus:
  prometheusSpec:
    retention: 3d
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    nodeSelector:
      observability: "heavy"

alertmanager:
  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: discord
      group_wait: 5s
      group_interval: 1m
      repeat_interval: 30m
      routes:
        - receiver: discord
          matchers:
            - severity=~"critical|warning"

    receivers:
      - name: discord
        webhook_configs:
          - url: http://alertmanager-discord.monitoring.svc.cluster.local:8080/alert
            send_resolved: true
  alertmanagerSpec:
    nodeSelector:
      observability: "heavy"
