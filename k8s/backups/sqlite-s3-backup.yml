apiVersion: batch/v1
kind: CronJob
metadata:
  name: sqlite-s3-backup
  namespace: default
spec:
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup
              image: alpine:3.20
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_DEFAULT_REGION
                  value: us-west-1
              command:
                - /bin/sh
                - -c
                - |
                  set -eu

                  apk add --no-cache sqlite aws-cli gzip

                  TIMESTAMP=$(date +%Y-%m-%d-%H-%M-%S)
                  SRC_DB="/data/nids.sqlite3"
                  BACKUP_DB="/tmp/nids-${TIMESTAMP}.sqlite3"
                  BACKUP_GZ="${BACKUP_DB}.gz"
                  S3_PATH="s3://homelab-backups-062700375181-us-west-1-an/sqlite-backups/$(basename "$BACKUP_GZ")"

                  echo "Creating SQLite backup from $SRC_DB"
                  sqlite3 "$SRC_DB" ".backup '$BACKUP_DB'"

                  echo "Compressing backup"
                  gzip "$BACKUP_DB"

                  echo "Uploading to $S3_PATH"
                  aws s3 cp "$BACKUP_GZ" "$S3_PATH"

                  echo "Backup complete"
              volumeMounts:
                - name: nids-data
                  mountPath: /data
          restartPolicy: OnFailure
          volumes:
            - name: nids-data
              persistentVolumeClaim:
                claimName: nids-data
