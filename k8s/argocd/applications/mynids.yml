apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mynids
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/spicyhek/homelab-infra.git
    targetRevision: main
    path: k8s/apps/nids
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
